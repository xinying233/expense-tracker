version: '3.8'

services:
  app:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/db_expense_tracker
      SPRING_DATASOURCE_USERNAME: expense-tracker
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: db_expense_tracker
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: expense-tracker
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
